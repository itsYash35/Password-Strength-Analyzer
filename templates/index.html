<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Analyzer</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --accent: #3b82f6; --success: #10b981; --warn: #f59e0b; --danger: #ef4444; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 480px; }
        h1 { text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; }
        input { width: 100%; padding: 14px; font-size: 16px; background: #0f172a; border: 2px solid #334155; border-radius: 10px; color: white; margin-bottom: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2563eb; }
        #result { margin-top: 1.5rem; padding: 1rem; background: #0f172a; border-radius: 10px; display: none; }
        .bar { height: 8px; background: #334155; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .fill { height: 100%; background: var(--danger); width: 0%; transition: 0.3s; }
        .feedback { margin: 6px 0; font-size: 0.9rem; }
        .suggestion { margin-top: 10px; padding: 8px; background: #064e3b; border-left: 3px solid var(--success); font-family: monospace; word-break: break-all; cursor: pointer; }
        .meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Password Strength Analyzer</h1>
        <input type="text" id="pwd" placeholder="Type a password..." autocomplete="off">
        <button onclick="analyze()">Check Strength</button>
        <div id="result">
            <h2 id="strength"></h2>
            <div class="bar"><div class="fill" id="fill"></div></div>
            <div class="meta"><span id="score"></span><span id="entropy"></span></div>
            <div id="feedback"></div>
            <div id="suggestion" class="suggestion" style="display:none" onclick="copySuggestion()"></div>
        </div>
    </div>

    <script>
        async function analyze() {
            const pwd = document.getElementById('pwd').value;
            const resDiv = document.getElementById('result');
            const response = await fetch('/analyze', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password: pwd}) });
            const data = await response.json();

            document.getElementById('strength').textContent = data.strength;
            document.getElementById('score').textContent = `Score: ${data.score}/100`;
            document.getElementById('entropy').textContent = `Entropy: ${data.entropy_bits} bits`;
            document.getElementById('feedback').innerHTML = data.feedback.map(f => `<div class="feedback">• ${f}</div>`).join('');

            const fill = document.getElementById('fill');
            fill.style.width = data.score + '%';
            fill.style.background = data.score >= 80 ? 'var(--success)' : data.score >= 60 ? 'var(--warn)' : 'var(--danger)';

            const sugDiv = document.getElementById('suggestion');
            if (data.suggestion) {
                sugDiv.textContent = "💡 Suggested: " + data.suggestion;
                sugDiv.style.display = "block";
            } else { sugDiv.style.display = "none"; }
            resDiv.style.display = "block";
        }
        function copySuggestion() {
            const text = document.getElementById('suggestion').textContent.replace("💡 Suggested: ", "");
            navigator.clipboard.writeText(text);
            document.getElementById('suggestion').textContent = "✅ Copied to clipboard!";
        }
        document.getElementById('pwd').addEventListener('keypress', e => { if(e.key==='Enter') analyze(); });
    </script>
</body>
</html>
